services:
  - type: web
    name: aqi-india-platform
    runtime: python
    buildCommand: pip install -r requirements.txt && flask seed-db
    startCommand: gunicorn run:app --workers 2 --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: aqi-db
          property: connectionString

databases:
  - name: aqi-db
    plan: free
